B. Một cung mạch ngắn, không hằng định, nối trực tiếp thân SMA (hoặc nhánh của nó) với thân IMA (hoặc nhánh của nó).
C. Vòng nối giữa động mạch trực tràng trên và giữa.
D. Động mạch cấp máu cho ruột thừa.
Đáp án: B
Giải thích: Cung Riolan, hay còn gọi là động mạch mạc treo uốn lượn, là một cung mạch nối không hằng định, nằm gần rễ mạc treo đại tràng ngang. Nó tạo ra một đường nối trực tiếp hơn (so với động mạch bờ) giữa hệ thống SMA (thường là từ động mạch đại tràng giữa) và hệ thống IMA (thường là từ động mạch đại tràng trái). Khi một trong hai động mạch chính bị hẹp hoặc tắc, cung này có thể phình to ra để đảm bảo tuần hoàn bàng hệ.
Câu 151. Động mạch trực tràng trên cấp máu cho phần nào của trực tràng?
A. Chỉ 1/3 dưới.
B. Chỉ 1/3 giữa.
C. Chủ yếu cho 2/3 trên.
D. Toàn bộ trực tràng và ống hậu môn.
Đáp án: C
Giải thích: Động mạch trực tràng trên, nhánh tận của IMA, là nguồn cấp máu động mạch chính cho 2/3 trên của trực tràng.
Câu 152. Động mạch trực tràng giữa và dưới là nhánh của động mạch nào?
A. Động mạch mạc treo tràng dưới.
B. Động mạch mạc treo tràng trên.
C. Động mạch chậu trong.
D. Động mạch chủ bụng.
Đáp án: C
Giải thích: Trong khi động mạch trực tràng trên thuộc hệ thống IMA, thì các động mạch trực tràng giữa và dưới thuộc hệ thống động mạch chậu trong. Động mạch trực tràng giữa thường tách ra từ nhánh trước của động mạch chậu trong. Động mạch trực tràng dưới tách ra từ động mạch thẹn trong (là một nhánh của động mạch chậu trong). Sự sắp xếp này tạo ra vòng nối quan trọng giữa hệ IMA và hệ chậu trong.
Câu 153. Động mạch ruột thừa có đặc điểm nào sau đây?
A. Là nhánh của động mạch đại tràng phải.
B. Đi trong mạc treo ruột thừa và là động mạch tận ở đoạn xa.
C. Có nhiều vòng nối phong phú ở đỉnh ruột thừa.
D. Xuất phát từ động mạch mạc treo tràng dưới.
Đáp án: B
Giải thích: Động mạch ruột thừa thường là nhánh của động mạch hồi đại tràng (từ nhánh manh tràng sau). Nó đi vào trong mạc treo ruột thừa để đến ruột thừa. Quan trọng nhất, đoạn xa của nó được coi là một động mạch tận, không có tuần hoàn bàng hệ hiệu quả, làm cho đỉnh ruột thừa dễ bị hoại tử khi động mạch này bị tắc nghẽn trong viêm ruột thừa.
Câu 154. Động mạch nào sau đây đi trong mạc treo đại tràng ngang?
A. Động mạch đại tràng phải.
B. Động mạch đại tràng trái.
C. Động mạch đại tràng giữa.
D. Động mạch hồi đại tràng.
Đáp án: C
Giải thích: Động mạch đại tràng giữa sau khi tách ra từ SMA sẽ chạy lên và đi vào giữa hai lá của mạc treo đại tràng ngang để cấp máu cho đại tràng ngang.
Câu 155. Case lâm sàng: Trong phẫu thuật phình động mạch chủ bụng, kẹp động mạch chủ dưới mức động mạch thận nhưng trên mức động mạch mạc treo tràng dưới (IMA). Sau phẫu thuật, bệnh nhân có nguy cơ bị thiếu máu cục bộ ở đoạn ruột nào nhất nếu tuần hoàn bàng hệ kém?
A. Ruột non.
B. Đại tràng phải.
C. Đại tràng trái (đại tràng xuống, đại tràng sigma).
D. Dạ dày.
Đáp án: C
Giải thích: Việc kẹp động mạch chủ ở vị trí đó sẽ làm gián đoạn dòng máu vào IMA. Nếu tuần hoàn bàng hệ từ hệ thống SMA qua động mạch bờ (Drummond) hoặc cung Riolan không đủ mạnh, toàn bộ vùng do IMA cấp máu - bao gồm 1/3 trái đại tràng ngang, đại tràng xuống, đại tràng sigma và phần trên trực tràng - sẽ có nguy cơ bị thiếu máu cục bộ.
Câu 156. Các động mạch sigma đi vào mạc treo đại tràng sigma và nối với nhau và với các động mạch nào?
A. Nối với nhau, với nhánh xuống của ĐM đại tràng trái ở trên và với ĐM trực tràng trên ở dưới.
B. Nối với động mạch đại tràng giữa.
C. Nối với động mạch chậu trong.
D. Nối với các động mạch của ruột non.
Đáp án: A
Giải thích: Các động mạch sigma (thường có 2-4 nhánh) tách ra từ IMA, đi vào mạc treo đại tràng sigma. Chúng tạo thành các cung nối với nhau. Cung trên cùng nối với nhánh xuống của động mạch đại tràng trái, và cung dưới cùng nối với động mạch trực tràng trên, góp phần tạo nên sự liên tục của động mạch bờ.
Câu 157. Động mạch trực tràng dưới sau khi tách ra từ động mạch thẹn trong, nó băng qua cấu trúc nào để đến ống hậu môn?
A. Khoang sau trực tràng.
B. Hố ngồi - hậu môn.
C. Ống bẹn.
D. Lỗ bịt.
Đáp án: B
Giải thích: Động mạch trực tràng dưới là một trong các thành phần đi trong ống Alcock ở thành ngoài của hố ngồi - hậu môn. Từ đó, nó cho các nhánh băng ngang qua lớp mỡ của hố ngồi - hậu môn để đi vào và cấp máu cho phần dưới ống hậu môn, các cơ thắt và da quanh hậu môn.
Câu 158. Động mạch mạc treo tràng trên (SMA) bị cấu trúc nào của tụy bắt chéo phía trước?
A. Đầu tụy.
B. Thân tụy.
C. Đuôi tụy.
D. Mỏm móc của tụy.
Đáp án: D
Giải thích: Sau khi xuất phát từ động mạch chủ, SMA chạy xuống dưới, đi sau thân tụy nhưng ra phía trước mỏm móc của tụy và phần ngang (D3) của tá tràng. Tĩnh mạch thận trái thường nằm kẹp giữa SMA ở phía trước và động mạch chủ ở phía sau.
Câu 159. Khi cắt đại tràng sigma, để bảo tồn cấp máu cho đoạn đại tràng xuống còn lại, phẫu thuật viên thường thắt động mạch mạc treo tràng dưới ở vị trí nào?
A. Ngay tại nguyên ủy từ động mạch chủ.
B. Ở dưới chỗ cho ra nhánh động mạch đại tràng trái.
C. Ở trên chỗ cho ra nhánh động mạch đại tràng trái.
D. Thắt riêng từng động mạch sigma.
Đáp án: B
Giải thích: Để giữ lại nguồn cấp máu cho phần đại tràng xuống sẽ được dùng để làm miệng nối, phẫu thuật viên cần bảo tồn động mạch đại tràng trái. Do đó, động mạch mạc treo tràng dưới sẽ được thắt và cắt ở vị trí sau khi nó đã cho ra nhánh động mạch đại tràng trái.
Câu 160. Vòng nối giữa động mạch trực tràng trên (từ IMA) và động mạch trực tràng giữa/dưới (từ ĐM chậu trong) có ý nghĩa gì trong trường hợp tắc động mạch mạc treo tràng dưới?
A. Không có ý nghĩa gì.
B. Nó có thể cung cấp máu ngược dòng từ hệ thống chậu trong để nuôi đại tràng sigma và đại tràng xuống.
C. Nó gây ra chảy máu ồ ạt.
D. Nó chỉ cấp máu cho ống hậu môn.
Đáp án: B
Giải thích: Đây là một vòng nối tuần hoàn bàng hệ cực kỳ quan trọng. Khi IMA bị tắc mạn tính (ví dụ do xơ vữa), máu có thể đi từ động mạch chậu trong -> động mạch trực tràng giữa/dưới -> nối với động mạch trực tràng trên -> đi ngược dòng lên các động mạch sigma và đại tràng trái để cấp máu cho đại tràng trái. Vòng nối này giúp ngăn ngừa thiếu máu cục bộ cho đoạn ruột này.
Câu 161. Động mạch nào cấp máu cho các cơ thắt hậu môn và da quanh hậu môn?
A. Động mạch trực tràng trên.
B. Động mạch trực tràng giữa.
C. Động mạch trực tràng dưới.
D. Động mạch cùng giữa.
Đáp án: C
Giải thích: Động mạch trực tràng dưới là nguồn cấp máu chính cho các cấu trúc ở phần thấp của ống hậu môn, bao gồm cả cơ thắt hậu môn trong và ngoài, cũng như da vùng quanh hậu môn.
Câu 162. Nhánh lên của động mạch đại tràng trái nối với nhánh nào của động mạch đại tràng giữa để tạo thành động mạch bờ ở vùng góc lách?
A. Nhánh phải.
B. Nhánh trái.
C. Thân chính.
D. Không có sự nối tiếp.
Đáp án: B
Giải thích: Nhánh lên của động mạch đại tràng trái (từ IMA) đi lên trong mạc treo đại tràng ngang và nối với nhánh trái của động mạch đại tràng giữa (từ SMA). Vòng nối này, một phần của động mạch bờ Drummond, có vai trò quan trọng trong việc cấp máu cho 1/3 trái đại tràng ngang và góc lách.
Câu 163. Động mạch manh tràng trước và sau là nhánh của động mạch nào?
A. Động mạch đại tràng phải.
B. Động mạch đại tràng giữa.
C. Động mạch hồi đại tràng.
D. Động mạch mạc treo tràng dưới.
Đáp án: C
Giải thích: Động mạch hồi đại tràng, sau khi đi đến vùng hồi-manh tràng, sẽ cho ra các nhánh manh tràng trước và manh tràng sau để cấp máu cho hai mặt tương ứng của manh tràng.
Câu 164. Case lâm sàng: Một bệnh nhân bị tắc hoàn toàn động mạch mạc treo tràng trên ngay tại nguyên ủy. Đoạn ruột nào sau đây sẽ KHÔNG bị ảnh hưởng bởi tình trạng thiếu máu này?
A. Hỗng tràng.
B. Đại tràng lên.
C. Đại tràng sigma.
D. 2/3 phải đại tràng ngang.
Đáp án: C
Giải thích: Tắc động mạch mạc treo tràng trên (SMA) sẽ gây thiếu máu toàn bộ vùng nó cấp máu, bao gồm ruột non, manh tràng, đại tràng lên và 2/3 phải đại tràng ngang. Đại tràng sigma được cấp máu bởi động mạch mạc treo tràng dưới (IMA), do đó sẽ không bị ảnh hưởng trực tiếp bởi tắc SMA, miễn là IMA vẫn bình thường.
Câu 165. Động mạch cùng giữa có đóng góp cấp máu cho vùng hậu môn trực tràng không?
A. Không, nó chỉ cấp máu cho xương cùng.
B. Có, nó cho một nhánh nhỏ đến thành sau chỗ nối hậu môn-trực tràng.
C. Có, nó là nguồn cấp máu chính cho trực tràng.
D. Có, nó hợp với động mạch trực tràng trên.
Đáp án: B
Giải thích: Động mạch cùng giữa, một nhánh nhỏ tận cùng của động mạch chủ bụng, đi xuống trên đường giữa mặt trước xương cùng. Nó có đóng góp một phần nhỏ vào việc cấp máu cho vùng hậu môn trực tràng bằng cách cho một nhánh nhỏ đi vào thành sau của chỗ nối hậu môn-trực tràng.
Câu 166. Vị trí tương đối của động mạch và tĩnh mạch mạc treo tràng trên là gì?
A. Động mạch nằm bên phải tĩnh mạch.
B. Tĩnh mạch nằm bên phải động mạch.
C. Động mạch nằm phía trước tĩnh mạch.
D. Tĩnh mạch nằm phía trước động mạch.
Đáp án: B
Giải thích: Trong rễ mạc treo ruột non, tĩnh mạch mạc treo tràng trên (SMV) đi song song và nằm ở bên phải của động mạch mạc treo tràng trên (SMA). Đây là một mốc giải phẫu quan trọng trong phẫu thuật.
Câu 167. Động mạch đại tràng trái, sau khi tách ra từ IMA, thường bắt chéo phía trước cấu trúc nào?
A. Động mạch chủ bụng.
B. Tĩnh mạch chủ dưới.
C. Niệu quản trái và các mạch sinh dục trái.
D. Thân tụy.
Đáp án: C
Giải thích: Động mạch đại tràng trái đi lên và sang trái trong khoang sau phúc mạc. Trên đường đi, nó thường bắt chéo phía trước của niệu quản trái và các mạch tuyến sinh dục trái.
Câu 168. Các động mạch thẳng (vasa recta) của đại tràng có đặc điểm gì?
A. Chúng dài và tạo thành nhiều cung nối tiếp như ở ruột non.
B. Chúng ngắn, ít cung nối và chia thành nhánh ngắn và dài.
C. Chúng chỉ cấp máu cho lớp thanh mạc.
D. Chúng xuất phát trực tiếp từ động mạch chủ.
Đáp án: B
Giải thích: Khác với ruột non có hệ thống cung mạch phức tạp và các động mạch thẳng dài, hệ thống cấp máu của đại tràng đơn giản hơn. Các động mạch thẳng của đại tràng xuất phát từ động mạch bờ, chúng thường ngắn hơn, ít tạo cung nối và chia thành các nhánh ngắn và dài để đi vào thành đại tràng.
Câu 169. Động mạch trực tràng giữa thường có đặc điểm gì về sự hiện diện và kích thước?
A. Luôn có mặt và có kích thước lớn.
B. Thường vắng mặt hoặc có đường kính rất nhỏ.
C. Luôn có hai nhánh đối xứng hai bên.
D. Là nguồn cấp máu chính cho bóng trực tràng.
Đáp án: B
Giải thích: Mặc dù được mô tả trong sách giải phẫu, động mạch trực tràng giữa là một động mạch không hằng định. Nó thường vắng mặt ở nhiều cá thể, hoặc nếu có thì cũng có đường kính rất nhỏ và vai trò cấp máu của nó cho thành trực tràng không lớn bằng động mạch trực tràng trên và dưới.
Câu 170. Ngoài vùng góc lách, vị trí nào khác của đại tràng được xem là có nguy cơ thiếu máu do tuần hoàn bàng hệ kém?
A. Manh tràng.
B. Đại tràng ngang đoạn giữa.
C. Chỗ nối đại tràng sigma - trực tràng.
D. Đại tràng lên.
Đáp án: C
Giải thích: Hai vị trí yếu về mặt tưới máu (điểm yếu Griffith ở góc lách và điểm yếu Sudeck ở chỗ nối đại tràng sigma - trực tràng) là những nơi dễ bị thiếu máu cục bộ nhất trên toàn bộ khung đại tràng.
        `;

        function parseQuizData(text) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            const questions = [];
            let currentQ = null;
            let questionCounter = 1;
            let skipMode = false; 

            lines.forEach(line => {
                if (line.match(/^(CÂU HỎI TRẮC NGHIỆM|TEAMDRCAT|Tài liệu|Phần|Mục|Bảng|\[\.\.\.)/i)) return;

                const isOptionA = line.match(/^A[\.\)]\s*(.*)/i);
                const isOptionB = line.match(/^B[\.\)]\s*(.*)/i);
                const isOptionC = line.match(/^C[\.\)]\s*(.*)/i);
                const isOptionD = line.match(/^D[\.\)]\s*(.*)/i);
                const isAnswer = line.match(/^Đáp án(?: đúng)?:\s*([A-D])/i);
                const isQuestionHeader = line.match(/^Câu\s*(\d+)(?:[\.\:]\s*(.*))?/i);

                if (isQuestionHeader) {
                    skipMode = false;
                    let id = isQuestionHeader[1];
                    let textPart = isQuestionHeader[2] || '';
                    currentQ = { id: id, question: textPart, options: {}, answer: '' };
                } else if (isAnswer) {
                    if (currentQ) {
                        currentQ.answer = isAnswer[1].toUpperCase();
                        questions.push(currentQ);
                        currentQ = null;
                        skipMode = true; 
                    }
                } else if (!skipMode && currentQ) {
                    if (isOptionA) currentQ.options['A'] = isOptionA[1].trim();
                    else if (isOptionB) currentQ.options['B'] = isOptionB[1].trim();
                    else if (isOptionC) currentQ.options['C'] = isOptionC[1].trim();
                    else if (isOptionD) currentQ.options['D'] = isOptionD[1].trim();
                    else if (!line.match(/^(CÂU HỎI TRẮC NGHIỆM|TEAMDRCAT|Tài liệu|Phần|Mục|Bảng)/i)) {
                        currentQ.question += (currentQ.question ? ' ' : '') + line;
                    }
                }
            });
            return questions;
        }

        function App() {
            const [appState, setAppState] = useState('intro');
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [answers, setAnswers] = useState({});
            const [flagged, setFlagged] = useState(new Set());
            const [timeRemaining, setTimeRemaining] = useState(190 * 60); 
            const [showMatrix, setShowMatrix] = useState(false);
            const [isPaused, setIsPaused] = useState(false);
            
            const scrollContainerRef = useRef(null);

            useEffect(() => {
                setQuestions(parseQuizData(rawQuizData));
            }, []);

            useEffect(() => {
                if (appState === 'result' && scrollContainerRef.current) {
                    scrollContainerRef.current.scrollTo({
                        top: 0,
                        behavior: 'smooth'
                    });
                }
            }, [appState]);

            useEffect(() => {
                let timer;
                if (appState === 'quiz' && !isPaused && timeRemaining > 0) {
                    timer = setInterval(() => setTimeRemaining(p => p - 1), 1000);
                } else if (timeRemaining <= 0 && appState === 'quiz') {
                    setAppState('result');
                }
                return () => clearInterval(timer);
            }, [appState, timeRemaining, isPaused]);

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            const startQuiz = () => {
                setAppState('quiz');
                setAnswers({});
                setFlagged(new Set());
                setTimeRemaining(190 * 60); 
                setCurrentIndex(0);
                setIsPaused(false);
            };

            const restartQuiz = () => {
                setAppState('intro');
                setAnswers({});
                setFlagged(new Set());
                setTimeRemaining(190 * 60);
                setCurrentIndex(0);
                setShowMatrix(false);
                
                if (scrollContainerRef.current) {
                    scrollContainerRef.current.scrollTo({ top: 0 });
                }
            };

            const togglePause = () => {
                if (appState === 'quiz') setIsPaused(!isPaused);
            };

            const handleSelectAnswer = (key) => {
                if (answers[currentIndex] || appState !== 'quiz' || isPaused) return;
                setAnswers(prev => ({ ...prev, [currentIndex]: key }));
            };

            const toggleFlag = () => {
                const newFlagged = new Set(flagged);
                if (newFlagged.has(currentIndex)) newFlagged.delete(currentIndex);
                else newFlagged.add(currentIndex);
                setFlagged(newFlagged);
            };

            const calculateScore = () => {
                return questions.reduce((acc, q, i) => (answers[i] === q.answer ? acc + 1 : acc), 0);
            };

            const getEncouragement = () => {
                if(questions.length === 0) return null;
                const score = calculateScore();
                const percent = score / questions.length;
                
                if (percent >= 0.9) {
                    return { 
                        title: "Hệ Tiêu Hóa Hoàn Hảo!", 
                        text: "Xuất sắc! Kiến thức giải phẫu ruột già của bạn vô cùng vững chắc. Từ manh tràng đến trực tràng đều không làm khó được bạn!", 
                        icon: "fa-circle-notch", 
                        color: "text-yellow-600 bg-yellow-50 border-yellow-200" 
                    };
                } else if (percent >= 0.7) {
                    return { 
                        title: "Nhu Động Ổn Định!", 
                        text: "Bạn đã làm rất tốt! Chỉ cần ôn lại một chút về các tĩnh mạch và động mạch chậu là bạn sẽ làm chủ hoàn toàn chủ đề này.", 
                        icon: "fa-stethoscope", 
                        color: "text-indigo-500 bg-indigo-50 border-indigo-200" 
                    };
                } else if (percent >= 0.5) {
                    return { 
                        title: "Coi Chừng Tắc Nghẽn!", 
                        text: "Giải phẫu ruột già khá rắc rối với các mốc giải phẫu hẹp và nếp gấp. Hãy xem lại bài một chút nhé!", 
                        icon: "fa-book-medical", 
                        color: "text-orange-500 bg-orange-50 border-orange-200" 
                    };
                } else {
                    return { 
                        title: "Cần Bổ Sung Lợi Khuẩn!", 
                        text: "Đừng nản chí! Hãy đọc kỹ lại phần giải thích chi tiết trong tài liệu gốc để nạp thêm kiến thức và làm lại một lần nữa. Mọi thứ sẽ 'thông suốt' thôi!", 
                        icon: "fa-notes-medical", 
                        color: "text-red-500 bg-red-50 border-red-200" 
                    };
                }
            };

            if (appState === 'intro') {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
                        <div className="max-w-2xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100">
                            <div className="bg-indigo-600 p-10 flex flex-col items-center text-white text-center">
                                <div className="bg-white/20 p-5 rounded-full mb-5 shadow-inner">
                                    <i className="fa-solid fa-circle-notch text-5xl text-white"></i>
                                </div>
                                <h1 className="text-3xl md:text-4xl font-extrabold uppercase tracking-tight mb-2">Giải Phẫu Ruột Già</h1>
                                <p className="text-indigo-100 text-lg font-medium opacity-90 tracking-wide">TÀI LIỆU ĐƯỢC BIÊN SOẠN BỞI TEAMDRCAT</p>
                            </div>
                            <div className="p-10">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                    <div className="flex items-center gap-4 bg-slate-50 p-5 rounded-2xl border border-slate-100 shadow-sm">
                                        <div className="bg-blue-100 p-3 rounded-xl text-blue-600">
                                            <i className="fa-solid fa-list-check text-2xl"></i>
                                        </div>
                                        <div>
                                            <p className="text-xs text-slate-400 font-bold uppercase">Tổng câu hỏi</p>
                                            <p className="text-2xl font-black text-slate-800">{questions.length}</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4 bg-slate-50 p-5 rounded-2xl border border-slate-100 shadow-sm">
                                        <div className="bg-orange-100 p-3 rounded-xl text-orange-600">
                                            <i className="fa-regular fa-clock text-2xl"></i>
                                        </div>
                                        <div>
                                            <p className="text-xs text-slate-400 font-bold uppercase">Thời gian</p>
                                            <p className="text-2xl font-black text-slate-800">190 Phút</p>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="bg-indigo-50 rounded-2xl p-6 mb-10 border border-indigo-100 flex items-start gap-4 text-indigo-800">
                                    <i className="fa-solid fa-circle-exclamation shrink-0 mt-1 text-xl"></i>
                                    <div className="text-sm leading-relaxed">
                                        <p className="font-bold mb-1">Hướng dẫn làm bài:</p>
                                        <ul className="list-disc pl-5 space-y-1">
                                            <li>Kết quả đúng/sai sẽ hiển thị <strong className="text-indigo-700">ngay lập tức</strong> khi chọn.</li>
                                            <li>Khi đã chọn, bạn <strong className="text-indigo-700">không thể thay đổi</strong> đáp án của câu đó.</li>
                                            <li>Sử dụng nút <strong className="text-indigo-700">Đánh dấu cờ</strong> để lưu lại những câu khó.</li>
                                        </ul>
                                    </div>
                                </div>

                                <button 
                                    onClick={startQuiz}
                                    className="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-xl font-bold py-5 rounded-2xl transition-all shadow-lg hover:shadow-indigo-600/40 flex items-center justify-center gap-3 uppercase tracking-wide"
                                >
                                    <i className="fa-solid fa-play text-xl"></i> Bắt đầu làm bài
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentQ = questions[currentIndex];
            const hasAnsweredCurrent = !!answers[currentIndex];
            const msg = getEncouragement();

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row">
                    {showMatrix && <div className="fixed inset-0 bg-slate-900/60 z-20 md:hidden backdrop-blur-sm" onClick={() => setShowMatrix(false)}></div>}
                    
                    <aside className={`
                        fixed md:sticky top-0 right-0 h-screen w-[360px] md:w-[450px] bg-white border-l border-slate-200 z-30 flex flex-col transition-transform duration-300
                        ${showMatrix ? 'translate-x-0' : 'translate-x-full md:translate-x-0'} md:order-2 shadow-2xl md:shadow-none
                    `}>
                        <div className="p-6 border-b flex justify-between items-center bg-white sticky top-0">
                            <h2 className="font-black text-slate-800 flex items-center gap-2 uppercase tracking-tighter text-lg">
                                <i className="fa-solid fa-book-open text-xl text-indigo-600"></i> Danh sách câu hỏi
                            </h2>
                            <button className="md:hidden text-slate-400 p-2 bg-slate-100 rounded-full hover:bg-slate-200 transition-colors" onClick={() => setShowMatrix(false)}>
                                <i className="fa-solid fa-xmark text-xl w-6 h-6 flex items-center justify-center"></i>
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 custom-scrollbar grid grid-cols-6 gap-3 content-start">
                            {questions.map((q, i) => {
                                let style = "bg-slate-50 text-slate-400 border-slate-200";
                                const isAns = !!answers[i];
                                if (isAns) {
                                    style = answers[i] === questions[i].answer ? "bg-emerald-100 text-emerald-700 border-emerald-300" : "bg-red-100 text-red-700 border-red-300";
                                }
                                if (currentIndex === i && appState !== 'review') style += " ring-2 ring-indigo-500 ring-offset-2";
                                if (flagged.has(i)) style += " !border-orange-400 !bg-orange-50";

                                return (
                                    <button 
                                        key={i}
                                        onClick={() => { 
                                            if (appState === 'review') {
                                                document.getElementById(`review-q-${i}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                            } else {
                                                setCurrentIndex(i); 
                                            }
                                            if(window.innerWidth < 768) setShowMatrix(false); 
                                        }}
                                        className={`h-12 w-full rounded-xl text-sm font-extrabold border-2 transition-all relative flex items-center justify-center hover:brightness-95 ${style}`}
                                    >
                                        {i + 1}
                                        {flagged.has(i) && <div className="absolute -top-1.5 -right-1.5 w-3.5 h-3.5 bg-orange-500 rounded-full border-2 border-white shadow-sm"></div>}
                                    </button>
                                );
                            })}
                        </div>
                        <div className="p-6 border-t bg-slate-50">
                            {appState === 'quiz' ? (
                                <button onClick={() => setAppState('result')} className="w-full bg-slate-900 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 uppercase tracking-wider hover:bg-slate-800 transition-colors">
                                    <i className="fa-solid fa-paper-plane text-lg"></i> Nộp bài
                                </button>
                            ) : appState === 'review' ? (
                                <button onClick={() => setAppState('result')} className="w-full bg-slate-900 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 uppercase tracking-wider hover:bg-slate-800 transition-colors">
                                    <i className="fa-solid fa-arrow-left text-lg"></i> Về bảng điểm
                                </button>
                            ) : (
                                <button onClick={restartQuiz} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-indigo-700 transition-colors">
                                    <i className="fa-solid fa-rotate-right text-lg"></i> Làm lại từ đầu
                                </button>
                            )}
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-screen md:order-1 overflow-hidden">
                        <header className="bg-white border-b px-6 py-4 flex items-center justify-between sticky top-0 z-10 shadow-sm">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                                    <i className="fa-solid fa-circle-notch text-2xl"></i>
                                </div>
                                <div className="hidden sm:block">
                                    <h1 className="text-sm font-black text-slate-800 uppercase tracking-tight line-clamp-1">Giải Phẫu Ruột Già</h1>
                                    <p className="text-[11px] text-slate-400 font-bold uppercase tracking-widest">Tài liệu được biên soạn bởi TeamDrCat</p>
                                </div>
                            </div>

                            <div className="flex items-center gap-4">
                                {appState === 'quiz' && (
                                    <React.Fragment>
                                        <div className={`px-5 py-2.5 rounded-2xl font-mono text-xl font-black border-2 flex items-center gap-2 ${timeRemaining < 300 ? 'bg-red-50 border-red-200 text-red-600 animate-pulse' : 'bg-slate-50 border-slate-200 text-slate-700'}`}>
                                            <i className="fa-regular fa-clock text-xl"></i>
                                            {formatTime(timeRemaining)}
                                        </div>
                                        <button onClick={togglePause} className="p-3 bg-slate-100 rounded-2xl hover:bg-slate-200 transition-colors text-indigo-600">
                                            {isPaused ? <i className="fa-solid fa-play text-xl"></i> : <i className="fa-solid fa-pause text-xl"></i>}
                                        </button>
                                    </React.Fragment>
                                )}
                                {appState === 'review' && (
                                    <div className="px-5 py-2.5 rounded-2xl font-bold bg-orange-100 text-orange-700 flex items-center gap-2">
                                        <i className="fa-solid fa-eye text-lg"></i> <span className="hidden sm:inline">Chế độ xem lại</span>
                                    </div>
                                )}
                                <button className="md:hidden bg-indigo-50 text-indigo-600 px-4 py-3 font-bold rounded-2xl flex items-center gap-2" onClick={() => setShowMatrix(true)}>
                                    <i className="fa-solid fa-bars text-lg"></i> <span className="text-sm">Câu hỏi</span>
                                </button>
                            </div>
                        </header>

                        <div ref={scrollContainerRef} className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
                            <div className="max-w-4xl mx-auto w-full pb-8">
                                {isPaused ? (
                                    <div className="bg-white rounded-3xl p-16 text-center shadow-xl border border-slate-100 animate-in fade-in zoom-in duration-300 mt-10">
                                        <div className="w-24 h-24 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-8">
                                            <i className="fa-solid fa-pause text-5xl"></i>
                                        </div>
                                        <h2 className="text-3xl font-black text-slate-800 mb-4">Bài thi đang tạm dừng</h2>
                                        <p className="text-slate-500 mb-10 text-lg">Hệ thống đã dừng thời gian để bạn nghỉ ngơi.</p>
                                        <button onClick={togglePause} className="bg-indigo-600 text-white px-12 py-4 rounded-2xl font-bold text-xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all">Tiếp tục ngay</button>
                                    </div>
                                ) : appState === 'result' ? (
                                    <div className="space-y-8 animate-in slide-in-from-bottom-8 duration-500 mt-4">
                                        <div className="bg-white p-10 md:p-12 rounded-[2rem] text-center shadow-xl border border-slate-100 relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-full h-2 bg-emerald-500"></div>
                                            <div className="w-24 h-24 bg-emerald-500 text-white rounded-full flex items-center justify-center text-5xl mx-auto mb-6 shadow-lg border-4 border-emerald-50">
                                                <i className="fa-solid fa-shield-halved text-4xl"></i>
                                            </div>
                                            <h2 className="text-3xl font-black text-slate-800 mb-6">Hoàn thành bài test!</h2>
                                            
                                            {msg && (
                                                <div className={`p-6 rounded-2xl border mb-8 flex flex-col items-center gap-2 ${msg.color}`}>
                                                    <i className={`fa-solid ${msg.icon} text-4xl mb-1 opacity-80`}></i>
                                                    <h3 className="text-xl font-black uppercase tracking-wide">{msg.title}</h3>
                                                    <p className="text-base font-medium opacity-90 max-w-lg">{msg.text}</p>
                                                </div>
                                            )}

                                            <div className="flex flex-col items-center gap-1 mb-8">
                                                <div className="flex items-baseline gap-2">
                                                    <span className="text-7xl font-black text-slate-900 tracking-tighter">{calculateScore()}</span>
                                                    <span className="text-2xl font-bold text-slate-300">/ {questions.length}</span>
                                                </div>
                                                <p className="text-slate-400 font-bold uppercase tracking-widest text-xs">Điểm số của bạn</p>
                                            </div>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                                <div className="bg-emerald-50 p-3 rounded-xl border border-emerald-100">
                                                    <p className="text-[10px] font-black text-emerald-600 uppercase mb-1">Đúng</p>
                                                    <p className="text-xl font-black text-emerald-700">{calculateScore()}</p>
                                                </div>
                                                <div className="bg-red-50 p-3 rounded-xl border border-red-100">
                                                    <p className="text-[10px] font-black text-red-600 uppercase mb-1">Sai</p>
                                                    <p className="text-xl font-black text-red-700">{Object.keys(answers).length - calculateScore()}</p>
                                                </div>
                                                <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                                    <p className="text-[10px] font-black text-slate-400 uppercase mb-1">Bỏ qua</p>
                                                    <p className="text-xl font-black text-slate-500">{questions.length - Object.keys(answers).length}</p>
                                                </div>
                                                <div className="bg-orange-50 p-3 rounded-xl border border-orange-100">
                                                    <p className="text-[10px] font-black text-orange-600 uppercase mb-1">Cờ</p>
                                                    <p className="text-xl font-black text-orange-700">{flagged.size}</p>
                                                </div>
                                            </div>

                                            <div className="mt-8 p-5 bg-indigo-50 rounded-xl border border-indigo-100 flex flex-col md:flex-row items-center justify-center gap-4">
                                                <i className="fa-solid fa-circle-info text-3xl text-indigo-500 shrink-0"></i>
                                                <p className="text-indigo-900 font-medium text-sm md:text-base text-left">
                                                    Bạn có thể tra cứu giải thích đáp án chi tiết ở bản <strong className="text-indigo-700 uppercase tracking-wide">PDF</strong> do <strong className="text-slate-900 uppercase tracking-wide">TEAMDRCAT</strong> biên soạn.
                                                </p>
                                            </div>

                                            <button 
                                                onClick={restartQuiz}
                                                className="w-full mt-6 bg-slate-900 hover:bg-slate-800 text-white text-lg font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg hover:shadow-slate-500/30 uppercase tracking-wide"
                                            >
                                                <i className="fa-solid fa-rotate-right text-xl"></i> Làm lại bài test
                                            </button>
                                            
                                            <button 
                                                onClick={() => { setAppState('review'); setCurrentIndex(0); }}
                                                className="w-full mt-3 bg-orange-100 hover:bg-orange-200 text-orange-700 text-lg font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all uppercase tracking-wide"
                                            >
                                                <i className="fa-solid fa-eye text-xl"></i> Xem lại bài làm
                                            </button>

                                        </div>
                                    </div>
                                ) : appState === 'review' ? (
                                    <div className="space-y-6 animate-in fade-in duration-300">
                                        <div className="bg-orange-50 p-4 rounded-2xl border border-orange-200 flex items-center justify-between shadow-sm sticky top-0 z-20">
                                            <h2 className="text-lg font-black text-orange-800 uppercase tracking-tight"><i className="fa-solid fa-list-check mr-2"></i> Danh sách tất cả câu hỏi</h2>
                                        </div>
                                        {questions.map((q, index) => {
                                            const isSelected = !!answers[index];
                                            const isCorrect = answers[index] === q.answer;
                                            
                                            return (
                                                <div key={index} id={`review-q-${index}`} className={`bg-white rounded-[1.5rem] shadow-sm border-2 p-6 md:p-8 relative overflow-hidden ${isSelected ? (isCorrect ? 'border-emerald-200' : 'border-red-200') : 'border-slate-200'}`}>
                                                    <div className="flex justify-between items-center mb-6">
                                                        <div className="flex items-center gap-3">
                                                            <span className={`px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest text-white shadow-sm ${isSelected ? (isCorrect ? 'bg-emerald-500' : 'bg-red-500') : 'bg-slate-400'}`}>
                                                                Câu {q.id}
                                                            </span>
                                                            {isSelected ? (
                                                                isCorrect ? <span className="text-emerald-600 font-bold text-sm"><i className="fa-solid fa-check mr-1"></i>Đúng</span>
                                                                : <span className="text-red-600 font-bold text-sm"><i className="fa-solid fa-xmark mr-1"></i>Sai</span>
                                                            ) : <span className="text-slate-500 font-bold text-sm"><i className="fa-solid fa-minus mr-1"></i>Chưa trả lời</span>}
                                                        </div>
                                                    </div>
                                                    <h3 className="text-lg md:text-xl font-bold text-slate-800 leading-snug mb-6">{q.question}</h3>
                                                    <div className="grid gap-3">
                                                        {['A', 'B', 'C', 'D'].map(key => {
                                                            const label = q.options[key];
                                                            if (!label) return null;

                                                            const isUserChoice = answers[index] === key;
                                                            const isCorrectOption = q.answer === key;

                                                            let stateStyle = "border-slate-200 bg-slate-50 text-slate-500 opacity-70 grayscale";
                                                            if (isCorrectOption) {
                                                                stateStyle = "bg-emerald-50 border-emerald-500 text-emerald-800 shadow-sm ring-1 ring-emerald-500";
                                                            } else if (isUserChoice) {
                                                                stateStyle = "bg-red-50 border-red-500 text-red-800 shadow-sm";
                                                            }

                                                            return (
                                                                <div key={key} className={`w-full p-4 rounded-xl border-2 text-left flex items-center gap-4 relative ${stateStyle}`}>
                                                                    <span className={`w-8 h-8 rounded-lg flex items-center justify-center font-bold text-base shrink-0 ${isCorrectOption ? 'bg-emerald-500 text-white border-emerald-500' : isUserChoice ? 'bg-red-500 text-white border-red-500' : 'bg-white text-slate-500 border-2 border-slate-200'}`}>
                                                                        {key}
                                                                    </span>
                                                                    <span className="text-base font-medium leading-normal flex-1 pr-8">{label}</span>
                                                                    {isCorrectOption && <i className="fa-solid fa-circle-check text-2xl text-emerald-500 absolute right-4 top-1/2 -translate-y-1/2"></i>}
                                                                    {isUserChoice && !isCorrectOption && <i className="fa-solid fa-circle-xmark text-2xl text-red-500 absolute right-4 top-1/2 -translate-y-1/2"></i>}
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        <div className="bg-white rounded-[1.5rem] shadow-sm border border-slate-200 p-6 md:p-8 relative overflow-hidden">
                                            <div className="flex justify-between items-center mb-6">
                                                <div className="flex items-center gap-2">
                                                    <span className="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest shadow-sm">Câu {currentQ?.id}</span>
                                                    <span className="text-slate-400 font-bold text-xs tracking-widest uppercase">/ {questions.length}</span>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <button onClick={toggleFlag} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold transition-all border ${flagged.has(currentIndex) ? 'bg-orange-50 border-orange-400 text-orange-600' : 'bg-white border-slate-200 text-slate-400 hover:text-slate-600 hover:border-slate-300'}`}>
                                                        <i className={"fa-solid fa-flag text-sm " + (flagged.has(currentIndex) ? 'text-orange-600' : '')}></i>
                                                        <span className="hidden sm:inline">{flagged.has(currentIndex) ? 'Đã đánh dấu' : 'Đánh dấu'}</span>
                                                    </button>
                                                </div>
                                            </div>

                                            <h3 className="text-lg md:text-xl font-bold text-slate-800 leading-snug mb-6">{currentQ?.question}</h3>

                                            <div className="grid gap-3">
                                                {['A', 'B', 'C', 'D'].map(key => {
                                                    const label = currentQ?.options[key];
                                                    if (!label) return null;

                                                    const isSelected = answers[currentIndex] === key;
                                                    const isCorrect = currentQ.answer === key;
                                                    const showAnswerState = hasAnsweredCurrent;

                                                    let stateStyle = "border-slate-200 bg-white hover:border-indigo-300 hover:bg-indigo-50/50";
                                                    if (showAnswerState) {
                                                        if (isCorrect) stateStyle = "bg-emerald-50 border-emerald-500 text-emerald-800 shadow-sm";
                                                        else if (isSelected) stateStyle = "bg-red-50 border-red-500 text-red-800 shadow-sm";
                                                        else stateStyle = "opacity-50 border-slate-100 bg-slate-50 grayscale";
                                                    }

                                                    return (
                                                        <button 
                                                            key={key}
                                                            onClick={() => handleSelectAnswer(key)}
                                                            disabled={showAnswerState}
                                                            className={`group w-full p-4 rounded-xl border-2 text-left flex items-center gap-4 option-transition relative ${stateStyle}`}
                                                        >
                                                            <span className={`w-8 h-8 rounded-lg flex items-center justify-center font-bold text-base shrink-0 transition-all ${
                                                                showAnswerState ? (isCorrect ? 'bg-emerald-500 text-white border-emerald-500' : isSelected ? 'bg-red-500 text-white border-red-500' : 'bg-slate-200 text-slate-400 border-slate-200') :
                                                                'bg-white text-slate-500 border-2 border-slate-200 group-hover:bg-indigo-600 group-hover:text-white group-hover:border-indigo-600'
                                                            }`}>
                                                                {key}
                                                            </span>
                                                            <span className="text-base font-medium leading-normal flex-1 pr-8">{label}</span>
                                                            
                                                            {showAnswerState && isCorrect && <i className="fa-solid fa-circle-check text-2xl text-emerald-500 absolute right-4 top-1/2 -translate-y-1/2"></i>}
                                                            {showAnswerState && isSelected && !isCorrect && <i className="fa-solid fa-circle-xmark text-2xl text-red-500 absolute right-4 top-1/2 -translate-y-1/2"></i>}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        <div className="flex items-center justify-between gap-4 pt-4 pb-20 md:pb-4">
                                            <button 
                                                onClick={() => setCurrentIndex(p => Math.max(0, p - 1))}
                                                disabled={currentIndex === 0}
                                                className="flex-1 bg-white border border-slate-200 px-6 py-3.5 rounded-xl font-bold text-slate-500 hover:text-slate-800 hover:border-slate-300 hover:bg-slate-50 disabled:opacity-0 transition-all flex items-center justify-center gap-2 uppercase tracking-wide text-xs"
                                            >
                                                <i className="fa-solid fa-chevron-left text-sm"></i> <span className="hidden sm:inline">Câu trước</span>
                                            </button>
                                            <button 
                                                onClick={() => setCurrentIndex(p => Math.min(questions.length - 1, p + 1))}
                                                disabled={currentIndex === questions.length - 1}
                                                className="flex-1 bg-white border border-slate-200 px-6 py-3.5 rounded-xl font-bold text-slate-800 hover:bg-slate-50 hover:border-slate-300 transition-all shadow-sm flex items-center justify-center gap-2 uppercase tracking-wide text-xs"
                                            >
                                                <span className="hidden sm:inline">Câu tiếp</span> <i className="fa-solid fa-chevron-right text-sm"></i>
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
